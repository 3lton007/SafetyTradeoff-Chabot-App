<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ model_name }}</title>
  <style>
    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid #d0ccc4;
      border-radius: 4px;
      font-size: 10.5px;
      background: #f5f2ec;
      color: #7a7570;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
      background: #f0ece3;
      color: #1a1a1a;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .sidebar {
      width: 256px;
      min-width: 256px;
      background: #1c1b19;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d2c29;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 18px 14px 12px;
      border-bottom: 1px solid #2d2c29;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #e07b39, #f4a261);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    .logo-text {
      font-size: 14.5px;
      font-weight: 600;
      color: #f0ece3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .new-chat-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      background: transparent;
      border: 1px solid #3d3c39;
      border-radius: 8px;
      color: #b8b4ab;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .new-chat-btn:hover {
      background: #2d2c29;
      border-color: #4d4c49;
      color: #f0ece3;
    }

    /* Chat List */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: #3d3c39; border-radius: 3px; }

    .section-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #5a5955;
      padding: 10px 6px 4px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 7px;
      cursor: pointer;
      color: #b8b4ab;
      font-size: 13px;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      overflow: hidden;
    }
    .chat-item:hover { background: #2a2927; color: #f0ece3; }
    .chat-item.active { background: #2d2c29; color: #f0ece3; }
    .chat-item span { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .chat-item svg { flex-shrink: 0; opacity: 0.55; }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid #2d2c29;
      flex-shrink: 0;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      background: #252422;
      border-radius: 6px;
      font-size: 11.5px;
      color: #7a7570;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #4caf50;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Main Area ───────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #faf8f4;
      overflow: hidden;
      min-width: 0;
    }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 22px;
      border-bottom: 1px solid #e8e4da;
      background: #faf8f4;
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 14.5px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
    }
    .model-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      background: #fff;
      border: 1px solid #e0dbd0;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #5a5650;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .model-badge-dot {
      width: 6px;
      height: 6px;
      background: #e07b39;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Messages scroll container */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0 8px;
    }
    .messages-container::-webkit-scrollbar { width: 5px; }
    .messages-container::-webkit-scrollbar-thumb { background: #d0ccc4; border-radius: 5px; }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px 24px;
      gap: 14px;
    }
    .welcome-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, #e07b39, #f4a261);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }
    .welcome h2 { font-size: 24px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.4px; }
    .welcome p { font-size: 14.5px; color: #7a7570; max-width: 380px; line-height: 1.65; }

    /* Messages inner (column of message rows) */
    .messages-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 22px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* Individual message row */
    .msg-row {
      display: flex;
      gap: 11px;
      align-items: flex-start;
    }
    .msg-row.user { flex-direction: row-reverse; }

    /* Avatar */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.assistant { background: linear-gradient(135deg, #e07b39, #f4a261); color: #fff; }
    .avatar.user { background: #e4e0d8; color: #5a5650; }

    /* Message content wrapper */
    .msg-content { max-width: calc(100% - 44px); }
    .msg-row.user .msg-content { display: flex; flex-direction: column; align-items: flex-end; }

    .msg-sender { font-size: 11.5px; font-weight: 600; color: #a09a93; margin-bottom: 4px; }

    /* Message bubble / text */
    .msg-text {
      font-size: 14.5px;
      line-height: 1.7;
      color: #1a1a1a;
    }

    /* User: colored pill */
    .msg-row.user .msg-text {
      background: #e07b39;
      color: #fff;
      padding: 9px 15px;
      border-radius: 18px 18px 4px 18px;
      display: inline-block;
    }

    /* Assistant: plain text, no bubble */
    .msg-row.assistant .msg-text { background: transparent; }

    /* Markdown rendered content */
    .msg-text p { margin-bottom: 8px; }
    .msg-text p:last-child { margin-bottom: 0; }
    .msg-text strong { font-weight: 700; }
    .msg-text em { font-style: italic; }
    .msg-text ul, .msg-text ol { margin: 8px 0 8px 20px; }
    .msg-text li { margin-bottom: 3px; }
    .msg-text h1, .msg-text h2, .msg-text h3 {
      font-weight: 700;
      margin: 12px 0 6px;
      line-height: 1.3;
    }
    .msg-text h1 { font-size: 19px; }
    .msg-text h2 { font-size: 16px; }
    .msg-text h3 { font-size: 14.5px; }
    .msg-text code {
      background: #f0ece3;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12.5px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
      color: #c0392b;
    }
    .msg-text pre {
      background: #1c1b19;
      padding: 14px 16px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .msg-text pre code {
      background: transparent;
      padding: 0;
      color: #d4d0c8;
      font-size: 13px;
      line-height: 1.6;
    }
    .msg-text blockquote {
      border-left: 3px solid #e07b39;
      padding-left: 12px;
      color: #7a7570;
      margin: 8px 0;
    }

    /* Typing indicator */
    .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 6px 0; }
    .typing-dot {
      width: 7px; height: 7px;
      background: #c8c4bb;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Composer ────────────────────────────────────────────────────────── */
    .composer-wrap {
      padding: 14px 22px 18px;
      flex-shrink: 0;
      background: #faf8f4;
    }
    .composer {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border: 1.5px solid #e0dbd0;
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .composer:focus-within {
      border-color: #e07b39;
      box-shadow: 0 0 0 3px rgba(224,123,57,0.12), 0 2px 8px rgba(0,0,0,0.05);
    }
    .composer-textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14.5px;
      line-height: 1.65;
      color: #1a1a1a;
      resize: none;
      padding: 13px 14px;
      min-height: 50px;
      max-height: 200px;
      overflow-y: auto;
      font-family: inherit;
    }
    .composer-textarea::placeholder { color: #b8b4ab; }
    .composer-textarea::-webkit-scrollbar { width: 3px; }
    .composer-textarea::-webkit-scrollbar-thumb { background: #d0ccc4; border-radius: 3px; }
    .send-btn {
      width: 36px;
      height: 36px;
      background: #e07b39;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 7px 8px 7px 0;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: #c96a2a; }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { background: #d4d0c8; cursor: not-allowed; }
    .composer-hint {
      text-align: center;
      font-size: 11px;
      color: #b8b4ab;
      margin-top: 7px;
    }

    /* ── Fade-in animation ───────────────────────────────────────────────── */
    .fade-in {
      animation: fadeIn 0.22s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">AI</div>
      <span class="logo-text">{{ model_name }}</span>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New chat
    </button>
  </div>

  <div class="chat-list" id="chatList"></div>

  <div class="sidebar-footer">
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>{{ model_name }} · active</span>
    </div>
  </div>
</aside>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main class="main">
  <div class="topbar">
    <span class="topbar-title" id="chatTitle">New Chat</span>
    <div class="model-badge">
      <div class="model-badge-dot"></div>
      <span>{{ model_name }}</span>
    </div>
  </div>

  <div class="messages-container" id="messagesContainer">
    <!-- Welcome screen (shown when no messages) -->
    <div id="welcomeScreen" class="welcome">
      <div class="welcome-icon">AI</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything. I'm here to help.</p>
    </div>

    <!-- Message list (hidden until first message) -->
    <div class="messages-inner" id="messagesInner" style="display:none;"></div>
  </div>

  <div class="composer-wrap">
    <div class="composer">
      <textarea
        class="composer-textarea"
        id="messageInput"
        placeholder="Message {{ model_name }}…"
        rows="1"
        autocomplete="off"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="composer-hint">
      <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift + Enter</kbd> for new line
    </p>
  </div>
</main>

<script>
  // ── Constants ───────────────────────────────────────────────────────────────
  const MODEL_NAME = {{ model_name | tojson }};
  const STORAGE_KEY = "chatbot_sessions_v1";
  const CHAT_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.55"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;

  // ── State ───────────────────────────────────────────────────────────────────
  let sessions = [];         // [{ title, messages: [{role, content}] }]
  let activeIdx = -1;        // index into sessions[], -1 = no active session
  let isWaiting = false;

  // ── Persistence ─────────────────────────────────────────────────────────────
  function loadStoredSessions() {
    try { sessions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { sessions = []; }
  }
  function saveSessions() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function esc(text) {
    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /**
   * Lightweight Markdown → HTML renderer.
   * Handles: fenced code blocks, inline code, bold, italic,
   * headers (# ## ###), unordered/ordered lists, blockquotes, paragraphs.
   */
  function renderMarkdown(raw) {
    // 1. Split on fenced code blocks to protect them
    const parts = raw.split(/(```[\s\S]*?```)/g);
    const rendered = parts.map((part, i) => {
      if (i % 2 === 1) {
        // Code block
        const inner = part.slice(3, -3);
        const firstNewline = inner.indexOf("\n");
        const code = firstNewline === -1 ? inner : inner.slice(firstNewline + 1);
        return `<pre><code>${esc(code.trim())}</code></pre>`;
      }

      // Normal text segment — process line by line
      let lines = part.split("\n");
      let html = "";
      let inList = null;   // "ul" | "ol" | null
      let paraBuffer = [];

      function flushPara() {
        if (paraBuffer.length === 0) return;
        const content = paraBuffer.join(" ").trim();
        if (content) html += `<p>${content}</p>`;
        paraBuffer = [];
      }
      function flushList() {
        if (inList) { html += `</${inList}>`; inList = null; }
      }

      function inlineFormat(line) {
        // Inline code first (protect from further replacement)
        const codeParts = line.split(/(`[^`]+`)/g);
        return codeParts.map((cp, ci) => {
          if (ci % 2 === 1) return `<code>${esc(cp.slice(1, -1))}</code>`;
          let s = esc(cp);
          s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
          s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
          return s;
        }).join("");
      }

      for (let line of lines) {
        // Heading
        const hMatch = line.match(/^(#{1,3})\s+(.+)/);
        if (hMatch) {
          flushPara(); flushList();
          const level = hMatch[1].length;
          html += `<h${level}>${inlineFormat(hMatch[2])}</h${level}>`;
          continue;
        }
        // Blockquote
        if (line.startsWith("> ")) {
          flushPara(); flushList();
          html += `<blockquote>${inlineFormat(line.slice(2))}</blockquote>`;
          continue;
        }
        // Unordered list
        if (/^[-*+]\s/.test(line)) {
          flushPara();
          if (inList !== "ul") { flushList(); html += "<ul>"; inList = "ul"; }
          html += `<li>${inlineFormat(line.replace(/^[-*+]\s/, ""))}</li>`;
          continue;
        }
        // Ordered list
        if (/^\d+\.\s/.test(line)) {
          flushPara();
          if (inList !== "ol") { flushList(); html += "<ol>"; inList = "ol"; }
          html += `<li>${inlineFormat(line.replace(/^\d+\.\s/, ""))}</li>`;
          continue;
        }
        // Blank line → paragraph break
        if (line.trim() === "") {
          flushPara(); flushList();
          continue;
        }
        // Regular line → accumulate into paragraph
        flushList();
        paraBuffer.push(inlineFormat(line));
      }
      flushPara(); flushList();
      return html;
    });
    return rendered.join("");
  }

  // ── Scroll ───────────────────────────────────────────────────────────────────
  function scrollBottom(instant = false) {
    const c = document.getElementById("messagesContainer");
    c.scrollTo({ top: c.scrollHeight, behavior: instant ? "instant" : "smooth" });
  }

  // ── Show/hide welcome screen ─────────────────────────────────────────────────
  function showWelcome() {
    document.getElementById("welcomeScreen").style.display = "flex";
    document.getElementById("messagesInner").style.display = "none";
  }
  function showMessages() {
    document.getElementById("welcomeScreen").style.display = "none";
    document.getElementById("messagesInner").style.display = "flex";
  }

  // ── Block / unblock input ────────────────────────────────────────────────────
  function setWaiting(val) {
    isWaiting = val;
    document.getElementById("sendBtn").disabled = val;
    document.getElementById("messageInput").disabled = val;
  }

  // ── Append a single message row ──────────────────────────────────────────────
  function appendMessage(role, content, animate = false) {
    showMessages();
    const inner = document.getElementById("messagesInner");
    const isUser = role === "user";

    const row = document.createElement("div");
    row.className = `msg-row ${role}${animate ? " fade-in" : ""}`;

    const avatarLabel = isUser ? "Y" : "AI";
    const senderLabel = isUser ? "You" : MODEL_NAME;
    const bodyHtml = isUser
      ? esc(content).replace(/\n/g, "<br>")
      : renderMarkdown(content);

    row.innerHTML = `
      <div class="avatar ${role}">${avatarLabel}</div>
      <div class="msg-content">
        <div class="msg-sender">${senderLabel}</div>
        <div class="msg-text">${bodyHtml}</div>
      </div>`;

    inner.appendChild(row);
    scrollBottom();
    return row;
  }

  // ── Typing indicator ─────────────────────────────────────────────────────────
  function showTyping() {
    showMessages();
    const inner = document.getElementById("messagesInner");
    const row = document.createElement("div");
    row.className = "msg-row assistant fade-in";
    row.id = "typingRow";
    row.innerHTML = `
      <div class="avatar assistant">AI</div>
      <div class="msg-content">
        <div class="msg-sender">${MODEL_NAME}</div>
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    inner.appendChild(row);
    scrollBottom();
  }
  function removeTyping() {
    const row = document.getElementById("typingRow");
    if (row) row.remove();
  }

  // ── Sidebar rendering ────────────────────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById("chatList");
    list.innerHTML = "";
    if (!sessions.length) return;

    const label = document.createElement("div");
    label.className = "section-label";
    label.textContent = "Recent";
    list.appendChild(label);

    sessions.forEach((s, i) => {
      const item = document.createElement("div");
      item.className = `chat-item${i === activeIdx ? " active" : ""}`;
      item.innerHTML = `${CHAT_ICON}<span>${esc(s.title)}</span>`;
      item.onclick = () => loadSession(i);
      list.appendChild(item);
    });
  }

  // ── Load a session from the sidebar ─────────────────────────────────────────
  function loadSession(idx) {
    activeIdx = idx;
    const s = sessions[idx];
    document.getElementById("chatTitle").textContent = s.title;
    document.getElementById("messagesInner").innerHTML = "";

    if (!s.messages.length) {
      showWelcome();
    } else {
      showMessages();
      s.messages.forEach(m => appendMessage(m.role, m.content, false));
      scrollBottom(true);
    }
    renderSidebar();

    // Sync server-side history so the model has context
    fetch("/load_session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: s.messages }),
    }).catch(() => {});
  }

  // ── New chat ─────────────────────────────────────────────────────────────────
  function newChat() {
    activeIdx = -1;
    document.getElementById("chatTitle").textContent = "New Chat";
    document.getElementById("messagesInner").innerHTML = "";
    showWelcome();
    renderSidebar();
    fetch("/clear", { method: "POST" }).catch(() => {});
    document.getElementById("messageInput").focus();
  }

  // ── Send message ─────────────────────────────────────────────────────────────
  async function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;

    // Create a new session on first message
    if (activeIdx === -1) {
      const title = text.length > 42 ? text.slice(0, 42) + "…" : text;
      sessions.unshift({ title, messages: [] });
      activeIdx = 0;
      document.getElementById("chatTitle").textContent = sessions[0].title;
    }

    sessions[activeIdx].messages.push({ role: "user", content: text });
    saveSessions();
    renderSidebar();

    appendMessage("user", text, true);
    input.value = "";
    input.style.height = "auto";

    setWaiting(true);
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) throw new Error(`Server error (${res.status})`);
      const data = await res.json();
      removeTyping();
      const reply = data.response || data.error || "(no response)";
      sessions[activeIdx].messages.push({ role: "assistant", content: reply });
      saveSessions();
      appendMessage("assistant", reply, true);
    } catch (err) {
      removeTyping();
      appendMessage("assistant", `**Error:** ${err.message}. Please try again.`, true);
    } finally {
      setWaiting(false);
      if (!isWaiting) input.focus();
    }
  }

  // ── Textarea: auto-resize + keyboard shortcut ────────────────────────────────
  const textarea = document.getElementById("messageInput");

  textarea.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 200) + "px";
  });

  textarea.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Init ────────────────────────────────────────────────────────────────────
  loadStoredSessions();
  renderSidebar();
  textarea.focus();
</script>
</body>
</html>
